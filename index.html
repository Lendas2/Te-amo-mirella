<!DOCTYPE html><html><head><style>@import url(https://fonts.googleapis.com/css?family=Shadows+Into+Light);@-webkit-keyframes throb{0%{-webkit-transform:scale(1)}35%{-webkit-transform:scale(1.2)}85%{-webkit-transform:scale(1)}}html{display:table;width:100%;height:100vmin}body{display:table-cell;vertical-align:middle;font-family:'Shadows Into Light';overflow:hidden}.wrapper{width:90vmin;height:90vmin;position:relative;margin:5vmin auto}.wrapper.throb{-webkit-animation:throb .5s infinite}input{display:none}input+label{width:30vmin;height:30vmin;line-height:30vmin;position:absolute;font-size:30vmin;text-align:center;transition:1s}#ck1+label,#ck2+label{border-radius:50%;top:0}#ck1+label{left:0}#ck2+label{right:10vmin}#ck3+label{bottom:5vmin;left:50%;margin:0 -9vmin;background:#fff}#ck1:checked+label,#ck2:checked+label,#ck3:checked+label{background:#c32a2a;font-size:0}#ck1:checked+label,#ck2:checked+label{width:54vmin;height:54vmin}#ck2:checked+label{right:0}#ck3:checked+label{width:49.5vmin;height:49.5vmin;bottom:17.28vmin;left:29.16vmin;transform:rotate(45deg)}span{position:absolute;bottom:0;left:0;color:#999}.bigHeart{position:fixed;top:50%;left:50%;width:60vmin;height:60vmin;background:#c32a2a;transform:translate(-50%,-50%) rotate(45deg) scale(0);z-index:10;transition:2s}.bigHeart:before,.bigHeart:after{content:"";position:absolute;width:60vmin;height:60vmin;background:#c32a2a;border-radius:50%}.bigHeart:before{top:-30vmin}.bigHeart:after{left:-30vmin}.bigHeart.show{transform:translate(-50%,-50%) rotate(45deg) scale(6)}.msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10vmin;color:#fff;opacity:0;transition:2s;z-index:20}.msg.show{opacity:1}</style></head><body><form><div class="wrapper"><input type="checkbox" id="ck1" onclick="check()"><label for="ck1">Eu</label><input type="checkbox" id="ck2" onclick="check()"><label for="ck2">amo</label><input type="checkbox" id="ck3" onclick="check()"><label for="ck3">você!!</label><span>(aperte nas palavras!)</span></div></form><div class="bigHeart"></div><div class="msg">eu te amo</div><script>function check(){let e=document.forms[0].elements,w=document.querySelector(".wrapper"),b=document.querySelector(".bigHeart"),m=document.querySelector(".msg");if(e[0].checked&&e[1].checked&&e[2].checked){w.classList.add("throb");setTimeout(()=>{b.classList.add("show");m.classList.add("show")},2000)}else{w.classList.remove("throb");b.classList.remove("show");m.classList.remove("show")}}</script></body></html>
